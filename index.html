<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: Arial, sans-serif;
            color: #fff;
        }

        #scoreboard {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            border: 3px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            background-color: #0a0e27;
        }

        canvas {
            display: block;
            background: #0a0e27;
        }

        #info {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #00ff41;
        }

        .controls {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="scoreboard">
        <span id="player1-score">0</span> : <span id="player2-score">0</span>
    </div>
    <div id="game-container">
        <canvas id="pong" width="800" height="400"></canvas>
    </div>
    <div id="info">
        <p>Left Paddle: Mouse Y or Arrow Keys (↑↓) | Right Paddle: AI</p>
        <p>Press SPACE to restart</p>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        // Player paddle (left)
        const player = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            score: 0
        };

        // Computer paddle (right)
        const computer = {
            x: canvas.width - paddleWidth - 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 5,
            score: 0
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: ballSize,
            speed: 5
        };

        // Input handling
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            // Restart game
            if (e.key === ' ') {
                resetBall();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse tracking for player paddle
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            
            // Keep paddle within bounds
            if (mouseY > 0 && mouseY < canvas.height) {
                player.y = mouseY - player.height / 2;
            }
        });

        // Game functions
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed;
        }

        function updatePlayer() {
            // Arrow keys control
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                player.y += player.speed;
            }

            // Keep player paddle in bounds
            if (player.y < 0) {
                player.y = 0;
            }
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        }

        function updateComputer() {
            // Simple AI: move towards the ball
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            if (computerCenter < ballCenter - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + 35) {
                computer.y -= computer.speed;
            }

            // Keep computer paddle in bounds
            if (computer.y < 0) {
                computer.y = 0;
            }
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Ball collision with paddles
            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.radius;
                // Add spin based on where ball hits the paddle
                ball.dy += (ball.y - (player.y + player.height / 2)) * 0.05;
            }

            if (
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.radius;
                // Add spin based on where ball hits the paddle
                ball.dy += (ball.y - (computer.y + computer.height / 2)) * 0.05;
            }

            // Ball out of bounds (scoring)
            if (ball.x - ball.radius < 0) {
                computer.score++;
                updateScore();
                resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                player.score++;
                updateScore();
                resetBall();
            }
        }

        function updateScore() {
            document.getElementById('player1-score').textContent = player.score;
            document.getElementById('player2-score').textContent = computer.score;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = '#00ff41';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw player paddle
            ctx.fillStyle = '#00ff41';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw computer paddle
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);

            // Draw ball
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw ball glow effect
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius + 4, 0, Math.PI * 2);
            ctx.stroke();
        }

        function gameLoop() {
            updatePlayer();
            updateComputer();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        resetBall();
        gameLoop();
    </script>
</body>
</html>
