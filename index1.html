<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game - 双人对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: Arial, sans-serif;
            color: #fff;
        }

        #scoreboard {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            border: 3px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            background-color: #0a0e27;
        }

        canvas {
            display: block;
            background: #0a0e27;
        }

        #info {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #00ff41;
        }

        .controls {
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="scoreboard">
        <span id="player1-score">0</span> : <span id="player2-score">0</span>
    </div>
    <div id="game-container">
        <canvas id="pong" width="800" height="400"></canvas>
    </div>
    <div id="info">
        <p><strong>玩家1（左）：W/S键 | 玩家2（右）：↑↓方向键</strong></p>
        <p>按 SPACE 重新开始游戏</p>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        // Player 1 paddle (left) - 左边挡板
        const player1 = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            score: 0
        };

        // Player 2 paddle (right) - 右边挡板
        const player2 = {
            x: canvas.width - paddleWidth - 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            score: 0
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: ballSize,
            speed: 5
        };

        // Input handling
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            // Restart game
            if (e.key === ' ') {
                resetBall();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Game functions
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed;
        }

        function updatePlayer1() {
            // W/S keys control
            if (keys['w'] || keys['W']) {
                player1.y -= player1.speed;
            }
            if (keys['s'] || keys['S']) {
                player1.y += player1.speed;
            }

            // Keep player1 paddle in bounds
            if (player1.y < 0) {
                player1.y = 0;
            }
            if (player1.y + player1.height > canvas.height) {
                player1.y = canvas.height - player1.height;
            }
        }

        function updatePlayer2() {
            // Arrow keys control
            if (keys['ArrowUp']) {
                player2.y -= player2.speed;
            }
            if (keys['ArrowDown']) {
                player2.y += player2.speed;
            }

            // Keep player2 paddle in bounds
            if (player2.y < 0) {
                player2.y = 0;
            }
            if (player2.y + player2.height > canvas.height) {
                player2.y = canvas.height - player2.height;
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Ball collision with player1 paddle (left)
            if (
                ball.x - ball.radius < player1.x + player1.width &&
                ball.y > player1.y &&
                ball.y < player1.y + player1.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player1.x + player1.width + ball.radius;
                // Add spin based on where ball hits the paddle
                ball.dy += (ball.y - (player1.y + player1.height / 2)) * 0.05;
            }

            // Ball collision with player2 paddle (right)
            if (
                ball.x + ball.radius > player2.x &&
                ball.y > player2.y &&
                ball.y < player2.y + player2.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player2.x - ball.radius;
                // Add spin based on where ball hits the paddle
                ball.dy += (ball.y - (player2.y + player2.height / 2)) * 0.05;
            }

            // Ball out of bounds (scoring)
            if (ball.x - ball.radius < 0) {
                player2.score++;
                updateScore();
                resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                player1.score++;
                updateScore();
                resetBall();
            }
        }

        function updateScore() {
            document.getElementById('player1-score').textContent = player1.score;
            document.getElementById('player2-score').textContent = player2.score;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = '#00ff41';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw player1 paddle (left) - 绿色
            ctx.fillStyle = '#00ff41';
            ctx.fillRect(player1.x, player1.y, player1.width, player1.height);

            // Draw player2 paddle (right) - 红色
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player2.x, player2.y, player2.width, player2.height);

            // Draw ball
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw ball glow effect
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius + 4, 0, Math.PI * 2);
            ctx.stroke();
        }

        function gameLoop() {
            updatePlayer1();
            updatePlayer2();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        resetBall();
        gameLoop();
    </script>
</body>
</html>
